workflows:
  ios-app-store:
    name: Ham Radio Exam Canada – iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios-credentials
      node: 20.17.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Fix API key format
        script: |
          python3 << 'PYEOF'
          import os, re
          key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')
          key = key.replace('\r', '')
          if key.count('\n') < 3:
              m = re.match(r'(-----BEGIN [^-]+-----)\s*(.*?)\s*(-----END [^-]+-----)', key, re.DOTALL)
              if m:
                  header, body, footer = m.group(1), m.group(2), m.group(3)
                  body = body.replace(' ', '').replace('\n', '')
                  chunks = [body[i:i+64] for i in range(0, len(body), 64)]
                  key = header + '\n' + '\n'.join(chunks) + '\n' + footer + '\n'
          with open('/tmp/asc_key.p8', 'w') as f:
              f.write(key)
          print('Key written. Lines:', key.count('\n'))
          PYEOF
          echo "APP_STORE_CONNECT_PRIVATE_KEY<<HEREDOC" >> $CM_ENV
          cat /tmp/asc_key.p8 >> $CM_ENV
          echo "HEREDOC" >> $CM_ENV

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files \
            ca.hamradioexam.canada \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number 6761153301 --platform IOS 2>/dev/null || echo "1")
          NEXT=$((LATEST + 1))
          echo "Setting build number to $NEXT (latest was $LATEST)"
          cd ios/App
          xcrun agvtool new-version -all $NEXT

      - name: Build and sign iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
