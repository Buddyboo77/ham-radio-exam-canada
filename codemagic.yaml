workflows:
  ios-app-store:
    name: Ham Radio Exam Canada – iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios-credentials
      node: 20.17.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Generate app icons
        script: |
          npx @capacitor/assets generate --ios

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files \
            ca.hamradioexam.canada \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          perl -i -pe 's/CURRENT_PROJECT_VERSION = \d+/CURRENT_PROJECT_VERSION = 4/g' ios/App/App.xcodeproj/project.pbxproj
          grep CURRENT_PROJECT_VERSION ios/App/App.xcodeproj/project.pbxproj

      - name: Build and sign iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
