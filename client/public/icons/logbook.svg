  <!-- Lines of text -->
  <line x1="36" y1="36" x2="66" y2="36" stroke="#4FD1C5" stroke-width="1.5" />
  <line x1="36" y1="44" x2="66" y2="44" stroke="#4FD1C5" stroke-width="1.5" />
