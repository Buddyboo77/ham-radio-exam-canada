<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Background -->
  <rect width="96" height="96" fill="#0A192F" rx="20" ry="20" />
  
  <!-- Map icon with radio stations -->
  <!-- Map outline -->
  <rect x="20" y="20" width="56" height="56" rx="2" ry="2" fill="#0A192F" stroke="#4FD1C5" stroke-width="2" />
  
  <!-- Map details -->
  <path d="M20,48 L76,48" stroke="#4FD1C5" stroke-width="1" opacity="0.5" />
  <path d="M48,20 L48,76" stroke="#4FD1C5" stroke-width="1" opacity="0.5" />
