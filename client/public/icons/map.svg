  <path d="M30,30 C40,36 50,24 60,30 C70,36 80,24 90,30" stroke="#4FD1C5" stroke-width="1" opacity="0.5" transform="scale(0.8) translate(-10, 40)" />
  
  <!-- Radio towers/repeaters -->
  <!-- Center tower -->
