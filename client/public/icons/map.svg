  <circle cx="48" cy="48" r="10" fill="none" stroke="#4FD1C5" stroke-width="1.5" opacity="0.7" />
  <circle cx="48" cy="48" r="16" fill="none" stroke="#4FD1C5" stroke-width="1" opacity="0.4" />
  
