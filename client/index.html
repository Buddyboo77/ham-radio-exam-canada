<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ham Radio License Study App</title>
    <meta name="description" content="Canadian amateur radio license preparation app featuring practice exams, Morse code training, and comprehensive study materials." />
    
    <!-- PWA support -->
    <meta name="theme-color" content="#4f93e0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ham Study" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons for various platforms -->
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/generated-icon.png" />
    <link rel="apple-touch-startup-image" href="/generated-icon.png" />
    
    <!-- Open Graph tags for better social media sharing -->
    <meta property="og:title" content="Ham Radio License Study App" />
    <meta property="og:description" content="Study for your Canadian amateur radio license with practice exams and Morse code training." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/generated-icon.png" />
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
